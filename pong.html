<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #000;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        .center-line {
            position: absolute;
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: repeating-linear-gradient(
                to bottom,
                #fff 0px,
                #fff 20px,
                transparent 20px,
                transparent 40px
            );
            pointer-events: none;
        }

        .paddle {
            position: absolute;
            width: 15px;
            height: 100px;
            background: #00ff00;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .paddle-left {
            left: 20px;
            top: 250px;
        }

        .paddle-right {
            right: 20px;
            top: 250px;
        }

        .ball {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #ff00ff;
            border-radius: 50%;
            left: 492.5px;
            top: 292.5px;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }

        .scoreboard {
            position: absolute;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: #fff;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        .score {
            min-width: 80px;
            text-align: center;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-size: 32px;
            display: none;
            z-index: 20;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .game-over h1 {
            margin-bottom: 20px;
            font-size: 48px;
            color: #ff00ff;
        }

        .game-over p {
            margin: 15px 0;
            font-size: 24px;
        }

        .game-over button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .game-over button:hover {
            background: #00cc00;
            transform: scale(1.05);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="center-line"></div>
        <div class="scoreboard">
            <div class="score">Player: <span id="player-score">0</span></div>
            <div class="score">Computer: <span id="computer-score">0</span></div>
        </div>
        <div class="paddle paddle-left" id="paddle-left"></div>
        <div class="paddle paddle-right" id="paddle-right"></div>
        <div class="ball" id="ball"></div>
        <div class="game-over" id="game-over">
            <h1 id="game-over-title">Game Over!</h1>
            <p id="game-over-message"></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
        <div class="instructions">
            <p>↑↓ Arrow Keys or Mouse to Control Left Paddle | First to 5 Points Wins!</p>
        </div>
    </div>

    <script>
        // Game Constants
        const GAME_WIDTH = 1000;
        const GAME_HEIGHT = 600;
        const PADDLE_WIDTH = 15;
        const PADDLE_HEIGHT = 100;
        const BALL_SIZE = 15;
        const PADDLE_SPEED = 6;
        const BALL_SPEED = 5;
        const MAX_SCORE = 5;

        // Game Objects
        const game = {
            playerScore: 0,
            computerScore: 0,
            gameRunning: true
        };

        const paddle = {
            left: {
                x: 20,
                y: 250,
                width: PADDLE_WIDTH,
                height: PADDLE_HEIGHT,
                dy: 0
            },
            right: {
                x: GAME_WIDTH - 20 - PADDLE_WIDTH,
                y: 250,
                width: PADDLE_WIDTH,
                height: PADDLE_HEIGHT,
                dy: 0
            }
        };

        const ball = {
            x: GAME_WIDTH / 2 - BALL_SIZE / 2,
            y: GAME_HEIGHT / 2 - BALL_SIZE / 2,
            width: BALL_SIZE,
            height: BALL_SIZE,
            dx: BALL_SPEED,
            dy: BALL_SPEED
        };

        // Input Tracking
        const keys = {};

        // Event Listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const gameContainer = document.querySelector('.game-container');
            const rect = gameContainer.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            
            // Move paddle to follow mouse
            paddle.left.y = Math.max(0, Math.min(mouseY - paddle.left.height / 2, GAME_HEIGHT - paddle.left.height));
        });

        // Update player paddle with arrow keys
        function updatePlayerPaddle() {
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                paddle.left.y = Math.max(0, paddle.left.y - PADDLE_SPEED);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                paddle.left.y = Math.min(GAME_HEIGHT - PADDLE_HEIGHT, paddle.left.y + PADDLE_SPEED);
            }
        }

        // Update computer paddle (AI)
        function updateComputerPaddle() {
            const paddleCenter = paddle.right.y + paddle.right.height / 2;
            const ballCenter = ball.y + ball.height / 2;
            const aiSpeed = PADDLE_SPEED * 0.8;

            if (paddleCenter < ballCenter - 35) {
                paddle.right.y = Math.min(GAME_HEIGHT - PADDLE_HEIGHT, paddle.right.y + aiSpeed);
            } else if (paddleCenter > ballCenter + 35) {
                paddle.right.y = Math.max(0, paddle.right.y - aiSpeed);
            }
        }

        // Collision Detection: Rectangle vs Rectangle
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (top and bottom)
            if (ball.y <= 0 || ball.y + ball.height >= GAME_HEIGHT) {
                ball.dy = -ball.dy;
                ball.y = Math.max(0, Math.min(ball.y, GAME_HEIGHT - ball.height));
            }

            // Paddle collision
            if (checkCollision(ball, paddle.left)) {
                if (ball.dx < 0) {
                    ball.dx = -ball.dx;
                    ball.x = paddle.left.x + paddle.left.width;
                    // Add spin based on where ball hits paddle
                    const hitPos = (ball.y - paddle.left.y) / paddle.left.height;
                    ball.dy += (hitPos - 0.5) * 4;
                }
            }

            if (checkCollision(ball, paddle.right)) {
                if (ball.dx > 0) {
                    ball.dx = -ball.dx;
                    ball.x = paddle.right.x - ball.width;
                    // Add spin based on where ball hits paddle
                    const hitPos = (ball.y - paddle.right.y) / paddle.right.height;
                    ball.dy += (hitPos - 0.5) * 4;
                }
            }

            // Score points
            if (ball.x < 0) {
                game.computerScore++;
                resetBall();
                checkGameOver();
            }
            if (ball.x > GAME_WIDTH) {
                game.playerScore++;
                resetBall();
                checkGameOver();
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = GAME_WIDTH / 2 - BALL_SIZE / 2;
            ball.y = GAME_HEIGHT / 2 - BALL_SIZE / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * BALL_SPEED;
            ball.dy = (Math.random() - 0.5) * BALL_SPEED;
        }

        // Check if game is over
        function checkGameOver() {
            if (game.playerScore >= MAX_SCORE) {
                endGame('You Win!', `Final Score: ${game.playerScore} - ${game.computerScore}`);
            } else if (game.computerScore >= MAX_SCORE) {
                endGame('Game Over!', `Computer Wins: ${game.computerScore} - ${game.playerScore}`);
            }
        }

        // End game
        function endGame(title, message) {
            game.gameRunning = false;
            document.getElementById('game-over-title').textContent = title;
            document.getElementById('game-over-message').textContent = message;
            document.getElementById('game-over').style.display = 'block';
        }

        // Reset game
        function resetGame() {
            game.playerScore = 0;
            game.computerScore = 0;
            game.gameRunning = true;
            document.getElementById('game-over').style.display = 'none';
            resetBall();
            paddle.left.y = 250;
            paddle.right.y = 250;
        }

        // Update score display
        function updateScore() {
            document.getElementById('player-score').textContent = game.playerScore;
            document.getElementById('computer-score').textContent = game.computerScore;
        }

        // Render function
        function render() {
            const leftPaddle = document.getElementById('paddle-left');
            const rightPaddle = document.getElementById('paddle-right');
            const ballElement = document.getElementById('ball');

            leftPaddle.style.top = paddle.left.y + 'px';
            rightPaddle.style.top = paddle.right.y + 'px';
            ballElement.style.left = ball.x + 'px';
            ballElement.style.top = ball.y + 'px';

            updateScore();
        }

        // Game loop
        function gameLoop() {
            if (game.gameRunning) {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
